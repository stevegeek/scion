harness: hermes
image: scion-hermes:latest
user: scion

provisioner:
  type: container-script
  interface_version: 1
  command: ["python3", "/home/scion/.scion/harness/provision.py"]
  timeout: 30s
  lifecycle_events:
    - pre-start
  required_image_tools:
    - python3

config_dir: .hermes
skills_dir: .hermes/skills
interrupt_key: C-c
instructions_file: AGENTS.md
system_prompt_mode: prepend_to_instructions

model_aliases:
  small: google/gemini-3.5-flash
  medium: anthropic/claude-sonnet-4
  large: anthropic/claude-opus-4

command:
  base: ["hermes", "chat", "--yolo"]
  task_flag: "-q"
  resume_flag: "-c"
  task_position: after_base_args

capabilities:
  limits:
    max_turns: { support: "yes" }
    max_model_calls: { support: "no", reason: "Hermes does not expose per-model-call hooks" }
    max_duration: { support: "yes" }
  telemetry:
    enabled: { support: "no", reason: "Hermes has Langfuse integration but no native OTEL" }
    native_emitter: { support: "no" }
  prompts:
    system_prompt: { support: "partial", reason: "System prompt is downgraded into AGENTS.md" }
    agent_instructions: { support: "yes" }
  auth:
    api_key: { support: "yes" }
    auth_file: { support: "no" }
    oauth_token: { support: "no" }
    vertex_ai: { support: "no", reason: "Hermes gemini provider uses Google AI Studio API keys, not Vertex AI ADC" }
  mcp:
    stdio: { support: "yes" }
    sse: { support: "yes" }
    streamable_http: { support: "yes" }
    project_scope: { support: "no", reason: "Not yet implemented" }

no_auth:
  behavior: drop-to-shell
  message: |
    This agent started without credentials.
    Run: hermes setup
    Then run: python3 /home/scion/.scion/harness/capture_auth.py

auth:
  default_type: api-key
  types:
    api-key:
      required_env:
        - any_of: ["GOOGLE_API_KEY", "OPENAI_API_KEY", "ANTHROPIC_API_KEY"]
  autodetect:
    env:
      GOOGLE_API_KEY: api-key
      OPENAI_API_KEY: api-key
      ANTHROPIC_API_KEY: api-key
