harness: copilot
image: scion-copilot:latest
user: scion

provisioner:
  type: container-script
  interface_version: 1
  command: ["python3", "/home/scion/.scion/harness/provision.py"]
  timeout: 30s
  lifecycle_events:
    - pre-start
  required_image_tools:
    - python3

config_dir: .copilot
skills_dir: .copilot/skills
interrupt_key: C-c
instructions_file: .github/copilot-instructions.md
system_prompt_mode: prepend_to_instructions

model_aliases:
  small: claude-haiku-4.5
  medium: claude-sonnet-4.5
  large: claude-opus-4.8

command:
  base: ["copilot", "--no-auto-update", "--no-remote", "--no-color",
         "--allow-all"]
  resume_flag: "--continue"
  task_flag: "-i"
  task_position: after_base_args

env_template:
  SCION_AGENT_NAME: "{{ .AgentName }}"
  COPILOT_AUTO_UPDATE: "false"
  NO_COLOR: "1"
  CI: "1"

mcp:
  global_config_file: .copilot/mcp-config.json
  global_config_path: mcpServers
  transport_field: type
  transport_map:
    stdio: local
    sse: http
    streamable-http: http

capabilities:
  limits:
    max_turns: { support: "no", reason: "Copilot CLI has no hook dialect for turn events" }
    max_model_calls: { support: "no", reason: "Copilot CLI has no hook dialect for model events" }
    max_duration: { support: "yes" }
  telemetry:
    enabled: { support: "no", reason: "Copilot telemetry config surface is undocumented" }
    native_emitter: { support: "no" }
  prompts:
    system_prompt: { support: "partial", reason: "System prompt is prepended to copilot-instructions.md" }
    agent_instructions: { support: "yes" }
  auth:
    api_key: { support: "yes" }
    auth_file: { support: "no", reason: "OAuth capture not implemented in initial version" }
    oauth_token: { support: "no" }
    vertex_ai: { support: "no", reason: "Copilot uses GitHub auth, not GCP" }
  mcp:
    stdio: { support: "yes" }
    sse: { support: "yes", reason: "Copilot maps SSE to its http transport type" }
    streamable_http: { support: "yes" }
    project_scope: { support: "no", reason: "Project-scoped MCP (.mcp.json) not implemented; entries demoted to global" }

no_auth:
  behavior: drop-to-shell
  message: |
    This agent started without credentials.
    Run: copilot login
    Complete the interactive login flow.
    Then run: python3 /home/scion/.scion/harness/capture_auth.py

auth:
  default_type: api-key
  types:
    api-key:
      required_env:
        - any_of: ["COPILOT_GITHUB_TOKEN", "GH_TOKEN", "GITHUB_TOKEN"]
  autodetect:
    env:
      COPILOT_GITHUB_TOKEN: api-key
      GH_TOKEN: api-key
      GITHUB_TOKEN: api-key
