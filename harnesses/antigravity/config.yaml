harness: antigravity
image: scion-antigravity:latest
user: scion

provisioner:
  type: container-script
  interface_version: 1
  command: ["python3", "/home/scion/.scion/harness/provision.py"]
  timeout: 30s
  lifecycle_events:
    - pre-start
  required_image_tools:
    - python3
    - jq

config_dir: .gemini/antigravity-cli
skills_dir: .gemini/antigravity-cli/skills
interrupt_key: C-c
instructions_file: .gemini/GEMINI.md
system_prompt_file: GEMINI.md
system_prompt_mode: prepend_to_instructions

command:
  base: ["/home/scion/.scion/harness/agy-wrapper.sh"]
  task_flag: "-prompt-interactive"
  task_position: after_base_args
  resume_flag: "-continue"

env_template:
  SCION_AGENT_NAME: "{{ .AgentName }}"

mcp:
  global_config_file: .gemini/config/mcp_config.json
  global_config_path: mcpServers
  transport_field: type
  transport_map:
    stdio: stdio
    sse: sse
    streamable-http: streamable-http

capabilities:
  limits:
    max_turns: { support: "yes" }
    max_model_calls: { support: "yes" }
    max_duration: { support: "yes" }
  telemetry:
    enabled: { support: "no", reason: "AGY has no native OTEL integration" }
    native_emitter: { support: "no" }
  prompts:
    system_prompt: { support: "partial", reason: "System prompt is downgraded to GEMINI.md preamble" }
    agent_instructions: { support: "yes" }
  auth:
    api_key: { support: "no", reason: "AGY uses OAuth, not API keys" }
    auth_file: { support: "yes", reason: "Via AGY_TOKEN file secret at ~/.gemini/antigravity-cli/antigravity-oauth-token" }
    oauth_token: { support: "no", reason: "AGY uses file-based OAuth token, not raw token injection" }
    vertex_ai: { support: "yes", reason: "Enterprise/GCP mode via AGY_TOKEN + GOOGLE_CLOUD_PROJECT + GOOGLE_CLOUD_LOCATION" }

no_auth:
  behavior: drop-to-shell
  message: |
    This agent started without credentials.
    Run: agy
    Complete the interactive login flow.
    Then run: python3 /home/scion/.scion/harness/capture_auth.py

auth:
  default_type: oauth-token
  types:
    oauth-token:
      required_files:
        - name: AGY_TOKEN
          type: file
          description: "Antigravity OAuth token JSON file"
          target_suffix: "/.gemini/antigravity-cli/antigravity-oauth-token"
    vertex-ai:
      required_env:
        - any_of: ["GOOGLE_CLOUD_PROJECT"]
        - any_of: ["GOOGLE_CLOUD_LOCATION", "GOOGLE_CLOUD_REGION"]
      required_files:
        - name: AGY_TOKEN
          type: file
          description: "Antigravity OAuth token JSON file"
          target_suffix: "/.gemini/antigravity-cli/antigravity-oauth-token"
  autodetect:
    env:
      AGY_TOKEN: oauth-token
